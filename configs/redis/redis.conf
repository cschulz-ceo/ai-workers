# Redis configuration for n8n queue mode
# Security
requirepass ${REDIS_PASSWORD}

# Memory management
maxmemory 512mb
maxmemory-policy allkeys-lru

# Persistence
save 900 1
appendonly yes
appendfsync everysec

# Network optimization
tcp-keepalive 300
tcp-backlog 511

# Connection handling
timeout 0
tcp-keepalive 300

# Performance tuning
tcp-nodelay yes
slowlog-log-slower-than 10000
slowlog-max-len 128

# Client limits
maxclients 1000
